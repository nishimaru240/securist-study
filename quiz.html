<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>SecuriST 予想問題集</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; min-width: 0; }

    :root {
      --bg:        #0f172a;
      --surface:   #1e293b;
      --border:    #334155;
      --text:      #e2e8f0;
      --muted:     #94a3b8;
      --accent:    #38bdf8;
      --star:      #fbbf24;
      --danger:    #f87171;
      --correct:   #34d399;
      --wrong:     #f87171;
    }

    html, body { width: 100%; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Hiragino Sans', 'Noto Sans JP', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100dvh;
      display: flex;
      flex-direction: column;
      font-size: 16px;
      line-height: 1.7;
      word-break: normal;
      overflow-wrap: break-word;
    }

    /* ── HEADER ── */
    .header {
      height: 52px;
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      padding: 0 16px;
      gap: 12px;
      flex-shrink: 0;
    }
    .header-title {
      flex: 1;
      font-size: 15px;
      font-weight: bold;
      color: var(--text);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .header-score {
      font-size: 13px;
      color: var(--muted);
      flex-shrink: 0;
    }
    .btn-menu {
      background: none;
      border: none;
      color: var(--text);
      font-size: 22px;
      cursor: pointer;
      padding: 6px;
      line-height: 1;
      flex-shrink: 0;
    }
    .btn-menu.hidden { visibility: hidden; }

    /* ── TOC DRAWER ── */
    .toc-overlay {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.55);
      z-index: 100;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.25s;
    }
    .toc-overlay.visible { opacity: 1; pointer-events: auto; }
    .toc-drawer {
      position: fixed;
      top: 0; left: 0; bottom: 0;
      width: min(340px, 88vw);
      background: var(--surface);
      display: flex;
      flex-direction: column;
      z-index: 101;
      transform: translateX(-100%);
      transition: transform 0.25s ease;
    }
    .toc-overlay.visible .toc-drawer { transform: translateX(0); }

    .toc-header {
      padding: 14px 16px;
      font-weight: bold;
      border-bottom: 1px solid var(--border);
      display: flex;
      justify-content: space-between;
      align-items: center;
      flex-shrink: 0;
    }
    .toc-close {
      background: none;
      border: none;
      color: var(--text);
      font-size: 20px;
      cursor: pointer;
    }
    .toc-list { flex: 1; overflow-y: auto; }
    .toc-item {
      display: flex;
      align-items: flex-start;
      gap: 10px;
      padding: 12px 14px;
      font-size: 13px;
      color: var(--text);
      cursor: pointer;
      border-left: 3px solid transparent;
      border-bottom: 1px solid rgba(255,255,255,0.04);
      line-height: 1.5;
    }
    .toc-item:hover { background: rgba(255,255,255,0.05); }
    .toc-item.active {
      border-left-color: var(--accent);
      background: rgba(56,189,248,0.07);
    }
    .toc-num {
      font-weight: bold;
      color: var(--muted);
      flex-shrink: 0;
      min-width: 28px;
      font-size: 13px;
    }
    .toc-item.active .toc-num { color: var(--accent); }
    .toc-text-wrap { flex: 1; min-width: 0; overflow-wrap: break-word; }
    .toc-chapter-name { font-size: 11px; color: var(--muted); margin-bottom: 2px; }
    .toc-question-excerpt { color: var(--text); }
    .toc-status {
      flex-shrink: 0;
      font-size: 15px;
      width: 18px;
      text-align: center;
      color: var(--muted);
      font-weight: bold;
    }
    .toc-status.ok { color: var(--correct); }
    .toc-status.ng { color: var(--wrong); }

    .toc-footer {
      border-top: 1px solid var(--border);
      padding: 8px 16px;
      flex-shrink: 0;
    }
    .toc-home-link {
      display: block;
      color: var(--muted);
      text-decoration: none;
      font-size: 13px;
      padding: 8px 0;
      text-align: center;
      cursor: pointer;
      background: none;
      border: none;
      width: 100%;
      font-family: inherit;
    }
    .toc-home-link:hover { color: var(--accent); }

    /* ── MAIN ── */
    .main {
      flex: 1;
      padding: 20px 16px 32px;
      width: 100%;
      max-width: 680px;
      margin: 0 auto;
      align-self: center;
    }
    .screen { display: none; }
    .screen.active { display: block; }

    /* ── HOME SCREEN ── */
    .home-hero {
      text-align: center;
      padding: 20px 0 28px;
    }
    .home-hero h1 {
      font-size: 1.6em;
      color: var(--accent);
      margin-bottom: 8px;
    }
    .home-hero p {
      font-size: 0.9em;
      color: var(--muted);
    }
    .mode-list { display: flex; flex-direction: column; gap: 14px; margin-bottom: 24px; }
    .mode-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 14px;
      padding: 20px;
      cursor: pointer;
      text-align: left;
      color: var(--text);
      font-family: inherit;
      transition: border-color 0.15s, background 0.15s;
    }
    .mode-card:hover {
      border-color: var(--accent);
      background: rgba(56,189,248,0.06);
    }
    .mode-card-title {
      display: flex;
      align-items: center;
      gap: 10px;
      font-size: 1.1em;
      font-weight: bold;
      margin-bottom: 6px;
      color: var(--text);
    }
    .mode-card-emoji { font-size: 1.3em; }
    .mode-card-desc {
      font-size: 0.88em;
      color: var(--muted);
      line-height: 1.6;
    }
    .home-footer {
      text-align: center;
      padding-top: 8px;
    }
    .home-footer a {
      color: var(--muted);
      font-size: 0.85em;
      text-decoration: none;
    }
    .home-footer a:hover { color: var(--accent); }
    .home-disclaimer {
      margin-top: 24px;
      padding: 14px 16px;
      border-top: 1px solid var(--border);
      font-size: 11px;
      color: var(--muted);
      line-height: 1.7;
      text-align: center;
    }
    .home-disclaimer a { color: var(--accent); }

    /* ── CHAPTER SELECT SCREEN ── */
    .back-link {
      display: inline-flex;
      align-items: center;
      gap: 4px;
      color: var(--muted);
      font-size: 0.9em;
      background: none;
      border: none;
      padding: 4px 0;
      cursor: pointer;
      margin-bottom: 16px;
      font-family: inherit;
    }
    .back-link:hover { color: var(--accent); }

    .section-title {
      font-size: 1.2em;
      font-weight: bold;
      margin-bottom: 16px;
    }
    .chapter-list { display: flex; flex-direction: column; gap: 10px; }
    .chapter-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 14px 16px;
      cursor: pointer;
      display: flex;
      align-items: center;
      gap: 12px;
      color: var(--text);
      font-family: inherit;
      text-align: left;
      transition: border-color 0.15s, background 0.15s;
    }
    .chapter-card:hover {
      border-color: var(--accent);
      background: rgba(56,189,248,0.06);
    }
    .chapter-card-text { flex: 1; min-width: 0; }
    .chapter-card-name { font-size: 0.95em; font-weight: bold; margin-bottom: 2px; }
    .chapter-card-meta { font-size: 0.78em; color: var(--muted); }
    .chapter-card-arrow { color: var(--muted); font-size: 1.1em; }

    /* ── PROGRESS ── */
    .progress-wrap {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 18px;
    }
    .progress-bar {
      flex: 1;
      height: 6px;
      background: var(--border);
      border-radius: 3px;
      overflow: hidden;
    }
    .progress-fill {
      height: 100%;
      background: var(--accent);
      border-radius: 3px;
      transition: width 0.4s;
    }
    .progress-label {
      font-size: 12px;
      color: var(--muted);
      white-space: nowrap;
      flex-shrink: 0;
    }

    /* ── QUESTION CARD ── */
    .q-chapter {
      font-size: 12px;
      color: var(--accent);
      letter-spacing: 0.05em;
      margin-bottom: 8px;
      overflow-wrap: break-word;
    }
    .q-text {
      font-size: 1em;
      line-height: 1.75;
      margin-bottom: 20px;
      overflow-wrap: break-word;
      word-break: normal;
    }
    .q-text code {
      display: block;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 12px 14px;
      font-size: 0.88em;
      margin-top: 10px;
      font-family: 'Menlo', 'Consolas', monospace;
      line-height: 1.5;
      white-space: pre-wrap;
      overflow-wrap: anywhere;
    }

    /* ── OPTIONS ── */
    .options {
      display: flex;
      flex-direction: column;
      gap: 10px;
      margin-bottom: 20px;
    }
    .opt-btn {
      background: var(--surface);
      border: 1px solid var(--border);
      color: var(--text);
      border-radius: 12px;
      padding: 14px 16px;
      font-size: 0.95em;
      line-height: 1.6;
      text-align: left;
      cursor: pointer;
      display: flex;
      gap: 12px;
      align-items: flex-start;
      width: 100%;
      transition: border-color 0.15s, background 0.15s;
      font-family: inherit;
    }
    .opt-btn:not(.answered):hover {
      border-color: var(--accent);
      background: rgba(56,189,248,0.07);
    }
    .opt-btn.correct {
      border-color: var(--correct);
      background: rgba(52,211,153,0.12);
    }
    .opt-btn.wrong {
      border-color: var(--wrong);
      background: rgba(248,113,113,0.1);
    }
    .opt-label {
      font-weight: bold;
      flex-shrink: 0;
      width: 22px;
    }
    .opt-text {
      flex: 1;
      min-width: 0;
      overflow-wrap: break-word;
    }
    .opt-btn.correct .opt-label { color: var(--correct); }
    .opt-btn.wrong   .opt-label { color: var(--wrong); }

    /* ── EXPLANATION ── */
    .explanation {
      display: none;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 16px;
      margin-bottom: 20px;
      overflow-wrap: break-word;
    }
    .explanation.visible { display: block; }
    .explanation-head {
      font-size: 13px;
      font-weight: bold;
      margin-bottom: 8px;
    }
    .explanation-head.ok  { color: var(--correct); }
    .explanation-head.ng  { color: var(--wrong); }
    .explanation-body {
      font-size: 0.9em;
      color: var(--muted);
      line-height: 1.75;
    }
    .explanation-body strong { color: var(--text); }
    .explanation-body code {
      background: var(--bg);
      padding: 1px 5px;
      border-radius: 4px;
      font-size: 0.92em;
    }

    /* ── NEXT BUTTON ── */
    .btn-next {
      display: none;
      width: 100%;
      background: var(--accent);
      color: #0f172a;
      border: none;
      border-radius: 12px;
      height: 52px;
      font-size: 1em;
      font-weight: bold;
      cursor: pointer;
      font-family: inherit;
    }
    .btn-next.visible { display: block; }

    /* ── RESULT SCREEN ── */
    .result-emoji { font-size: 56px; margin-bottom: 16px; text-align: center; }
    .result-title { font-size: 1.4em; font-weight: bold; margin-bottom: 8px; text-align: center; }
    .result-score { font-size: 1.1em; color: var(--muted); margin-bottom: 24px; text-align: center; }
    .result-score span { font-size: 2em; font-weight: bold; color: var(--accent); }
    .result-note {
      display: block;
      font-size: 0.7em;
      color: var(--muted);
      margin-top: 6px;
    }
    .result-detail {
      background: var(--surface);
      border-radius: 12px;
      padding: 12px 14px;
      text-align: left;
      margin-bottom: 24px;
      font-size: 0.9em;
      max-height: 320px;
      overflow-y: auto;
    }
    .result-row {
      display: flex;
      align-items: flex-start;
      gap: 8px;
      padding: 6px 0;
      border-bottom: 1px solid var(--border);
      line-height: 1.5;
    }
    .result-row:last-child { border-bottom: none; }
    .result-badge {
      font-size: 11px;
      font-weight: bold;
      padding: 2px 7px;
      border-radius: 4px;
      flex-shrink: 0;
      margin-top: 2px;
      white-space: nowrap;
    }
    .result-badge.ok   { background: rgba(52,211,153,0.2);  color: var(--correct); }
    .result-badge.ng   { background: rgba(248,113,113,0.15); color: var(--wrong); }
    .result-badge.skip { background: rgba(148,163,184,0.15); color: var(--muted); }
    .result-q-text {
      color: var(--muted);
      flex: 1;
      min-width: 0;
      overflow-wrap: break-word;
    }
    .btn-primary, .btn-secondary {
      width: 100%;
      border-radius: 12px;
      height: 52px;
      font-size: 1em;
      cursor: pointer;
      margin-bottom: 10px;
      font-family: inherit;
      border: 1px solid var(--border);
    }
    .btn-primary {
      background: var(--accent);
      color: #0f172a;
      border: none;
      font-weight: bold;
    }
    .btn-secondary {
      background: none;
      color: var(--text);
    }
    .btn-secondary:hover {
      border-color: var(--accent);
      color: var(--accent);
    }

    /* ── LOADING / ERROR ── */
    .status-msg {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 12px;
      color: var(--muted);
      padding: 60px 20px;
      text-align: center;
      font-size: 14px;
    }
  </style>
</head>
<body>

<!-- TOC Drawer -->
<div class="toc-overlay" id="tocOverlay">
  <div class="toc-drawer">
    <div class="toc-header">
      <span>問題一覧</span>
      <button class="toc-close" id="tocClose">✕</button>
    </div>
    <div class="toc-list" id="tocList"></div>
    <div class="toc-footer">
      <button class="toc-home-link" id="tocHomeBtn">← ホームに戻る</button>
    </div>
  </div>
</div>

<div class="header">
  <button class="btn-menu hidden" id="btnMenu" title="問題一覧">☰</button>
  <div class="header-title" id="headerTitle">予想問題集</div>
  <div class="header-score" id="headerScore"></div>
</div>

<div class="main">
  <!-- HOME SCREEN -->
  <div class="screen active" id="homeScreen">
    <div class="home-hero">
      <h1>予想問題集</h1>
      <p>SecuriST 認定セキュアWebアプリケーション設計士</p>
    </div>
    <div class="mode-list">
      <button class="mode-card" id="btnModeChapter">
        <div class="mode-card-title"><span class="mode-card-emoji">📚</span>章別で学ぶ</div>
        <div class="mode-card-desc">章を選んで集中的に演習。問題と選択肢の順序は毎回シャッフル。</div>
      </button>
      <button class="mode-card" id="btnModeMock">
        <div class="mode-card-title"><span class="mode-card-emoji">🎯</span>模試モード（30問）</div>
        <div class="mode-card-desc">各章から3〜4問ずつバランスよく合計30問を出題。本番形式の練習に。</div>
      </button>
    </div>
    <div class="home-footer">
      <a href="index.html">← スライドビューアーに戻る</a>
    </div>
    <div class="home-disclaimer">
      ※本アプリは個人作成の非公式学習補助資料です。<br>
      「SecuriST®」「セキュリスト®」は GSX の商標です。<br>
      問題は公開資料を参考に独自作成しており、公式試験問題の再現を含みません。<br>
      <a href="https://github.com/nishimaru240/securist-study#免責事項" target="_blank" rel="noopener">免責事項</a>
    </div>
  </div>

  <!-- CHAPTER SELECT SCREEN -->
  <div class="screen" id="chapterScreen">
    <button class="back-link" id="btnBackHome1">← 戻る</button>
    <div class="section-title">章を選択</div>
    <div class="chapter-list" id="chapterList"></div>
  </div>

  <!-- QUIZ SCREEN -->
  <div class="screen" id="quizScreen">
    <div class="progress-wrap">
      <div class="progress-bar">
        <div class="progress-fill" id="progressFill" style="width:0%"></div>
      </div>
      <div class="progress-label" id="progressLabel">1 / 30</div>
    </div>

    <div class="q-chapter" id="qChapter"></div>
    <div class="q-text"    id="qText"></div>
    <div class="options"   id="options"></div>

    <div class="explanation" id="explanation">
      <div class="explanation-head" id="explanationHead"></div>
      <div class="explanation-body" id="explanationBody"></div>
    </div>

    <button class="btn-next" id="btnNext">次の問題 →</button>
  </div>

  <!-- RESULT SCREEN -->
  <div class="screen" id="resultScreen">
    <div class="result-emoji" id="resultEmoji"></div>
    <div class="result-title" id="resultTitle"></div>
    <div class="result-score" id="resultScore"></div>
    <div class="result-detail" id="resultDetail"></div>
    <button class="btn-primary" id="btnRetry">もう一度挑戦する</button>
    <button class="btn-secondary" id="btnBackHome2">ホームに戻る</button>
  </div>

  <!-- LOADING / ERROR -->
  <div class="screen" id="errorScreen">
    <div class="status-msg" id="errorMsg"></div>
  </div>
</div>

<script>
// ── Chapter names ──────────────────────────────────────────
const CHAPTER_NAMES = {
  1: "第1章: セキュリティ要件",
  2: "第2章: 認証",
  3: "第3章: 認可・アクセス制御",
  4: "第4章: セッション管理",
  5: "第5章: 入力処理",
  6: "第6章: 出力処理",
  7: "第7章: HTTPS・暗号化",
  8: "第8章: その他のセキュリティ設計",
};

// ── State ──────────────────────────────────────────────────
let allQuestions = [];
let currentSet   = [];   // current quiz subset
let optionOrders = [];   // optionOrders[i] = [2,0,3,1] etc
let answers      = [];   // answers[i] = null | { displayedPos, correct }
let current      = 0;
let answered     = false;
let mode         = '';   // 'chapter' | 'mock'
let currentChapter = null;

// ── DOM ────────────────────────────────────────────────────
const $ = id => document.getElementById(id);

const screens = {
  home:    $('homeScreen'),
  chapter: $('chapterScreen'),
  quiz:    $('quizScreen'),
  result:  $('resultScreen'),
  error:   $('errorScreen'),
};

const qChapter      = $('qChapter');
const qText         = $('qText');
const optionsEl     = $('options');
const explanation   = $('explanation');
const explanHead    = $('explanationHead');
const explanBody    = $('explanationBody');
const btnNext       = $('btnNext');
const progressFill  = $('progressFill');
const progressLabel = $('progressLabel');
const headerScore   = $('headerScore');
const headerTitle   = $('headerTitle');
const btnMenu       = $('btnMenu');
const tocOverlay    = $('tocOverlay');
const tocList       = $('tocList');
const tocClose      = $('tocClose');
const tocHomeBtn    = $('tocHomeBtn');
const resultEmoji   = $('resultEmoji');
const resultTitle   = $('resultTitle');
const resultScore   = $('resultScore');
const resultDetail  = $('resultDetail');

// ── Helpers ────────────────────────────────────────────────
function shuffle(arr) {
  const a = arr.slice();
  for (let i = a.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
}

function plainExcerpt(text, max = 38) {
  const stripped = text.replace(/<[^>]+>/g, '').split('\n')[0].trim();
  return stripped.length > max ? stripped.slice(0, max) + '…' : stripped;
}

function showScreen(name) {
  Object.values(screens).forEach(s => s.classList.remove('active'));
  screens[name].classList.add('active');
  btnMenu.classList.toggle('hidden', name !== 'quiz' && name !== 'result');
  if (name === 'home') {
    headerTitle.textContent = '予想問題集';
    headerScore.textContent = '';
  }
}

function getScore()         { return answers.filter(a => a && a.correct).length; }
function getAnsweredCount() { return answers.filter(a => a !== null).length; }

function updateHeader() {
  if (mode === 'chapter') {
    headerTitle.textContent = CHAPTER_NAMES[currentChapter];
  } else if (mode === 'mock') {
    headerTitle.textContent = '模試モード（30問）';
  }
  headerScore.textContent = currentSet.length > 0 ? `${getScore()} / ${getAnsweredCount()}` : '';
}

// ── Load JSON ──────────────────────────────────────────────
async function loadQuestions() {
  try {
    const res = await fetch('questions.json', { cache: 'no-cache' });
    if (!res.ok) throw new Error(`questions.json: ${res.status}`);
    allQuestions = await res.json();
    if (!Array.isArray(allQuestions) || allQuestions.length === 0) {
      throw new Error('問題データが空です');
    }
    buildChapterList();
    showScreen('home');
  } catch (e) {
    showScreen('error');
    $('errorMsg').innerHTML = `
      <div style="font-size:32px">⚠️</div>
      <div style="color:var(--danger)">問題データの読み込みに失敗しました</div>
      <div>${e.message}</div>
      <div style="font-size:12px">ローカルで開く場合は Live Server などを経由してください。</div>
    `;
  }
}

// ── Chapter list (chapter select screen) ───────────────────
function buildChapterList() {
  const counts = {};
  allQuestions.forEach(q => { counts[q.chapter] = (counts[q.chapter] || 0) + 1; });

  const list = $('chapterList');
  list.innerHTML = '';
  Object.keys(CHAPTER_NAMES).sort((a, b) => +a - +b).forEach(num => {
    const n = +num;
    const count = counts[n] || 0;
    if (count === 0) return;
    const card = document.createElement('button');
    card.className = 'chapter-card';
    card.innerHTML = `
      <div class="chapter-card-text">
        <div class="chapter-card-name">${CHAPTER_NAMES[n]}</div>
        <div class="chapter-card-meta">${count} 問</div>
      </div>
      <div class="chapter-card-arrow">→</div>
    `;
    card.addEventListener('click', () => startChapterQuiz(n));
    list.appendChild(card);
  });
}

// ── Start quiz ─────────────────────────────────────────────
function startChapterQuiz(chapterNum) {
  mode = 'chapter';
  currentChapter = chapterNum;
  const set = shuffle(allQuestions.filter(q => q.chapter === chapterNum));
  initQuiz(set);
}

function startMockQuiz() {
  mode = 'mock';
  currentChapter = null;
  const TARGET = 30;
  const chapters = [...new Set(allQuestions.map(q => q.chapter))].sort((a, b) => a - b);
  const base = Math.floor(TARGET / chapters.length);          // 8章なら 3
  const extra = TARGET - base * chapters.length;              // 8章なら 6（=6章だけ4問）
  const bonusChapters = new Set(shuffle(chapters).slice(0, extra));

  const picked = [];
  for (const ch of chapters) {
    const count = base + (bonusChapters.has(ch) ? 1 : 0);
    const pool = allQuestions.filter(q => q.chapter === ch);
    picked.push(...shuffle(pool).slice(0, Math.min(count, pool.length)));
  }
  // 章をまたいで全体をシャッフル
  initQuiz(shuffle(picked));
}

function initQuiz(set) {
  currentSet   = set;
  current      = 0;
  answers      = new Array(set.length).fill(null);
  optionOrders = set.map(q => shuffle(q.options.map((_, i) => i)));
  buildToc();
  showScreen('quiz');
  renderQuestion();
}

// ── Render question ────────────────────────────────────────
function renderQuestion() {
  const q = currentSet[current];
  const total = currentSet.length;

  qChapter.textContent = CHAPTER_NAMES[q.chapter];
  qText.innerHTML = q.text.replace(/\n/g, '<br>');

  progressFill.style.width = `${((current + 1) / total) * 100}%`;
  progressLabel.textContent = `${current + 1} / ${total}`;
  updateHeader();

  optionsEl.innerHTML = '';
  const labels = ['a', 'b', 'c', 'd'];
  const order = optionOrders[current];
  order.forEach((origIdx, dispPos) => {
    const btn = document.createElement('button');
    btn.className = 'opt-btn';
    btn.type = 'button';
    btn.innerHTML = `<span class="opt-label">${labels[dispPos]}.</span><span class="opt-text">${q.options[origIdx]}</span>`;
    btn.addEventListener('click', () => selectAnswer(dispPos));
    optionsEl.appendChild(btn);
  });

  const prev = answers[current];
  if (prev !== null) {
    answered = true;
    applyAnsweredState(prev.displayedPos);
  } else {
    answered = false;
    explanation.classList.remove('visible');
    btnNext.classList.remove('visible');
  }

  updateTocActive();
}

function applyAnsweredState(selectedDispPos) {
  const q = currentSet[current];
  const order = optionOrders[current];
  const correctDispPos = order.indexOf(q.correct);
  const isCorrect = selectedDispPos === correctDispPos;

  optionsEl.querySelectorAll('.opt-btn').forEach((btn, i) => {
    btn.classList.add('answered');
    if (i === correctDispPos) btn.classList.add('correct');
    else if (i === selectedDispPos && !isCorrect) btn.classList.add('wrong');
  });

  explanHead.className = 'explanation-head ' + (isCorrect ? 'ok' : 'ng');
  explanHead.textContent = isCorrect ? '✓ 正解！' : '✗ 不正解';
  explanBody.innerHTML = q.explanation;
  explanation.classList.add('visible');

  btnNext.textContent = current < currentSet.length - 1 ? '次の問題 →' : '結果を見る';
  btnNext.classList.add('visible');
}

function selectAnswer(displayedPos) {
  if (answered) return;
  answered = true;

  const q = currentSet[current];
  const order = optionOrders[current];
  const correctDispPos = order.indexOf(q.correct);
  const isCorrect = displayedPos === correctDispPos;

  answers[current] = { displayedPos, correct: isCorrect };
  applyAnsweredState(displayedPos);
  updateTocItem(current);
  updateHeader();
}

// ── Next button ────────────────────────────────────────────
btnNext.addEventListener('click', () => {
  if (current < currentSet.length - 1) {
    current++;
    renderQuestion();
    window.scrollTo(0, 0);
  } else {
    showResult();
  }
});

// ── TOC ────────────────────────────────────────────────────
function buildToc() {
  tocList.innerHTML = '';
  currentSet.forEach((q, i) => {
    const item = document.createElement('div');
    item.className = 'toc-item';
    item.dataset.index = i;
    item.innerHTML = `
      <div class="toc-num">Q${i + 1}</div>
      <div class="toc-text-wrap">
        <div class="toc-chapter-name">${CHAPTER_NAMES[q.chapter]}</div>
        <div class="toc-question-excerpt">${plainExcerpt(q.text)}</div>
      </div>
      <div class="toc-status" data-status></div>
    `;
    item.addEventListener('click', () => {
      current = i;
      if (screens.result.classList.contains('active')) {
        showScreen('quiz');
      }
      renderQuestion();
      closeToc();
      window.scrollTo(0, 0);
    });
    tocList.appendChild(item);
  });
}

function updateTocItem(i) {
  const item = tocList.querySelector(`.toc-item[data-index="${i}"]`);
  if (!item) return;
  const status = item.querySelector('[data-status]');
  const ans = answers[i];
  if (ans === null)       { status.textContent = '';  status.className = 'toc-status'; }
  else if (ans.correct)   { status.textContent = '✓'; status.className = 'toc-status ok'; }
  else                    { status.textContent = '✗'; status.className = 'toc-status ng'; }
}

function updateTocActive() {
  tocList.querySelectorAll('.toc-item').forEach((item, i) => {
    item.classList.toggle('active', i === current);
  });
}

function openToc()  {
  tocOverlay.classList.add('visible');
  const active = tocList.querySelector('.toc-item.active');
  if (active) active.scrollIntoView({ block: 'center' });
}
function closeToc() { tocOverlay.classList.remove('visible'); }

btnMenu.addEventListener('click', openToc);
tocClose.addEventListener('click', closeToc);
tocOverlay.addEventListener('click', e => { if (e.target === tocOverlay) closeToc(); });
tocHomeBtn.addEventListener('click', () => { closeToc(); goHome(); });

// ── Result ─────────────────────────────────────────────────
function showResult() {
  showScreen('result');

  const total       = currentSet.length;
  const correctNum  = getScore();
  const answeredNum = getAnsweredCount();
  const pct = answeredNum > 0 ? Math.round((correctNum / answeredNum) * 100) : 0;

  if (pct >= 90)      { resultEmoji.textContent = '🏆'; resultTitle.textContent = '素晴らしい！'; }
  else if (pct >= 70) { resultEmoji.textContent = '🎉'; resultTitle.textContent = '合格ライン到達！'; }
  else if (pct >= 50) { resultEmoji.textContent = '📖'; resultTitle.textContent = 'もう少し！'; }
  else                { resultEmoji.textContent = '💪'; resultTitle.textContent = '復習して再挑戦！'; }

  const noteHtml = answeredNum < total
    ? `<span class="result-note">※全 ${total} 問中 ${answeredNum} 問回答</span>`
    : '';
  resultScore.innerHTML = `正答 <span>${correctNum} / ${answeredNum}</span>（${pct}%）${noteHtml}`;

  resultDetail.innerHTML = answers.map((ans, i) => {
    const q = currentSet[i];
    const short = plainExcerpt(q.text, 42);
    let badge;
    if (ans === null)     badge = '<span class="result-badge skip">未回答</span>';
    else if (ans.correct) badge = '<span class="result-badge ok">正解</span>';
    else                  badge = '<span class="result-badge ng">不正解</span>';
    return `<div class="result-row">${badge}<span class="result-q-text">Q${i + 1}. ${short}</span></div>`;
  }).join('');

  window.scrollTo(0, 0);
}

// ── Retry / Home ───────────────────────────────────────────
$('btnRetry').addEventListener('click', () => {
  // 同じセットを再シャッフルして開始（順序・選択肢も新規シャッフル）
  if (mode === 'chapter')   startChapterQuiz(currentChapter);
  else if (mode === 'mock') startMockQuiz();
});

function goHome() {
  mode = '';
  currentChapter = null;
  currentSet = [];
  answers = [];
  showScreen('home');
}

$('btnBackHome1').addEventListener('click', goHome);
$('btnBackHome2').addEventListener('click', goHome);

// ── Mode selection ─────────────────────────────────────────
$('btnModeChapter').addEventListener('click', () => showScreen('chapter'));
$('btnModeMock').addEventListener('click', startMockQuiz);

// ── Boot ───────────────────────────────────────────────────
loadQuestions();
</script>
