<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>SecuriST 予想問題集</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:        #0f172a;
      --surface:   #1e293b;
      --border:    #334155;
      --text:      #e2e8f0;
      --muted:     #94a3b8;
      --accent:    #38bdf8;
      --star:      #fbbf24;
      --danger:    #f87171;
      --correct:   #34d399;
      --wrong:     #f87171;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Hiragino Sans', 'Noto Sans JP', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100dvh;
      display: flex;
      flex-direction: column;
      font-size: 16px;
      line-height: 1.7;
    }

    /* ── HEADER ── */
    .header {
      height: 52px;
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      padding: 0 16px;
      gap: 12px;
      flex-shrink: 0;
    }
    .header-title {
      flex: 1;
      font-size: 15px;
      font-weight: bold;
      color: var(--text);
    }
    .header-score {
      font-size: 13px;
      color: var(--muted);
    }
    .btn-home {
      background: none;
      border: none;
      color: var(--muted);
      font-size: 20px;
      cursor: pointer;
      padding: 4px;
      line-height: 1;
      text-decoration: none;
    }

    /* ── MAIN ── */
    .main {
      flex: 1;
      padding: 20px 16px 32px;
      max-width: 680px;
      width: 100%;
      margin: 0 auto;
    }

    /* ── PROGRESS ── */
    .progress-wrap {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 20px;
    }
    .progress-bar {
      flex: 1;
      height: 6px;
      background: var(--border);
      border-radius: 3px;
      overflow: hidden;
    }
    .progress-fill {
      height: 100%;
      background: var(--accent);
      border-radius: 3px;
      transition: width 0.4s;
    }
    .progress-label {
      font-size: 12px;
      color: var(--muted);
      white-space: nowrap;
    }

    /* ── QUESTION CARD ── */
    .q-chapter {
      font-size: 12px;
      color: var(--accent);
      text-transform: uppercase;
      letter-spacing: 0.05em;
      margin-bottom: 8px;
    }
    .q-text {
      font-size: 1em;
      line-height: 1.75;
      margin-bottom: 20px;
      white-space: pre-wrap;
    }
    .q-text code {
      display: block;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 12px 14px;
      font-size: 0.88em;
      margin-top: 10px;
      font-family: 'Menlo', 'Consolas', monospace;
      line-height: 1.5;
      white-space: pre;
    }

    /* ── OPTIONS ── */
    .options {
      display: flex;
      flex-direction: column;
      gap: 10px;
      margin-bottom: 20px;
    }
    .opt-btn {
      background: var(--surface);
      border: 1px solid var(--border);
      color: var(--text);
      border-radius: 12px;
      padding: 14px 16px;
      font-size: 0.95em;
      line-height: 1.6;
      text-align: left;
      cursor: pointer;
      display: flex;
      gap: 12px;
      align-items: flex-start;
      transition: border-color 0.15s, background 0.15s;
    }
    .opt-btn:not(.answered):hover {
      border-color: var(--accent);
      background: rgba(56,189,248,0.07);
    }
    .opt-btn.correct {
      border-color: var(--correct);
      background: rgba(52,211,153,0.12);
    }
    .opt-btn.wrong {
      border-color: var(--wrong);
      background: rgba(248,113,113,0.1);
    }
    .opt-label {
      font-weight: bold;
      flex-shrink: 0;
      width: 22px;
    }
    .opt-btn.correct .opt-label { color: var(--correct); }
    .opt-btn.wrong   .opt-label { color: var(--wrong); }

    /* ── EXPLANATION ── */
    .explanation {
      display: none;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 16px;
      margin-bottom: 20px;
    }
    .explanation.visible { display: block; }
    .explanation-head {
      font-size: 13px;
      font-weight: bold;
      margin-bottom: 8px;
    }
    .explanation-head.ok  { color: var(--correct); }
    .explanation-head.ng  { color: var(--wrong); }
    .explanation-body {
      font-size: 0.9em;
      color: var(--muted);
      line-height: 1.75;
    }
    .explanation-body strong { color: var(--text); }

    /* ── NEXT BUTTON ── */
    .btn-next {
      display: none;
      width: 100%;
      background: var(--accent);
      color: #0f172a;
      border: none;
      border-radius: 12px;
      height: 52px;
      font-size: 1em;
      font-weight: bold;
      cursor: pointer;
    }
    .btn-next.visible { display: block; }

    /* ── RESULT SCREEN ── */
    .result-screen {
      display: none;
      text-align: center;
      padding: 40px 0;
    }
    .result-screen.visible { display: block; }
    .result-emoji { font-size: 56px; margin-bottom: 16px; }
    .result-title { font-size: 1.4em; font-weight: bold; margin-bottom: 8px; }
    .result-score { font-size: 1.1em; color: var(--muted); margin-bottom: 24px; }
    .result-score span { font-size: 2em; font-weight: bold; color: var(--accent); }
    .result-detail {
      background: var(--surface);
      border-radius: 12px;
      padding: 16px;
      text-align: left;
      margin-bottom: 24px;
      font-size: 0.9em;
      max-height: 300px;
      overflow-y: auto;
    }
    .result-row {
      display: flex;
      align-items: flex-start;
      gap: 8px;
      padding: 6px 0;
      border-bottom: 1px solid var(--border);
      line-height: 1.5;
    }
    .result-row:last-child { border-bottom: none; }
    .result-badge {
      font-size: 12px;
      font-weight: bold;
      padding: 2px 7px;
      border-radius: 4px;
      flex-shrink: 0;
      margin-top: 2px;
    }
    .result-badge.ok { background: rgba(52,211,153,0.2); color: var(--correct); }
    .result-badge.ng { background: rgba(248,113,113,0.15); color: var(--wrong); }
    .result-q-text { color: var(--muted); }
    .btn-retry {
      width: 100%;
      background: var(--border);
      color: var(--text);
      border: none;
      border-radius: 12px;
      height: 52px;
      font-size: 1em;
      cursor: pointer;
      margin-bottom: 12px;
    }
    .btn-retry:hover { background: var(--accent); color: #0f172a; }
    .btn-home-large {
      display: block;
      width: 100%;
      background: none;
      color: var(--muted);
      border: 1px solid var(--border);
      border-radius: 12px;
      height: 48px;
      font-size: 0.95em;
      cursor: pointer;
      text-decoration: none;
      line-height: 48px;
      text-align: center;
    }

    @media (orientation: landscape) {
      .main {
        padding-left: max(16px, calc((100% - 680px) / 2));
        padding-right: max(16px, calc((100% - 680px) / 2));
      }
    }
  </style>
</head>
<body>

<div class="header">
  <a class="btn-home" href="index.html" title="スライドへ戻る">☰</a>
  <div class="header-title">予想問題集</div>
  <div class="header-score" id="headerScore">0 / 0</div>
</div>

<div class="main" id="main">
  <!-- QUIZ SCREEN -->
  <div id="quizScreen">
    <div class="progress-wrap">
      <div class="progress-bar">
        <div class="progress-fill" id="progressFill" style="width:0%"></div>
      </div>
      <div class="progress-label" id="progressLabel">1 / 30</div>
    </div>

    <div class="q-chapter" id="qChapter"></div>
    <div class="q-text"    id="qText"></div>
    <div class="options"   id="options"></div>

    <div class="explanation" id="explanation">
      <div class="explanation-head" id="explanationHead"></div>
      <div class="explanation-body" id="explanationBody"></div>
    </div>

    <button class="btn-next" id="btnNext">次の問題 →</button>
  </div>

  <!-- RESULT SCREEN -->
  <div class="result-screen" id="resultScreen">
    <div class="result-emoji" id="resultEmoji"></div>
    <div class="result-title" id="resultTitle"></div>
    <div class="result-score" id="resultScore"></div>
    <div class="result-detail" id="resultDetail"></div>
    <button class="btn-retry" id="btnRetry">もう一度挑戦する</button>
    <a class="btn-home-large" href="index.html">スライドに戻る</a>
  </div>
</div>

<script>
const QUESTIONS = [
  // ──────────────────────────────────────────────
  // 第1章: セキュリティ要件
  // ──────────────────────────────────────────────
  {
    chapter: "第1章: セキュリティ要件",
    text: "OWASP Top 10（2021年版）で第1位にランクされた脆弱性カテゴリはどれか。",
    options: [
      "インジェクション",
      "アクセス制御の不備",
      "セキュリティの設定ミス",
      "暗号化の失敗"
    ],
    correct: 1,
    explanation: "<strong>アクセス制御の不備（Broken Access Control）</strong>が2021年版で1位になった。2017年版では「インジェクション」が1位だったが、アクセス制御の問題は実際の侵害で最も多く観測される。"
  },
  {
    chapter: "第1章: セキュリティ要件",
    text: "PCI DSS（Payment Card Industry Data Security Standard）の主な目的として正しいものはどれか。",
    options: [
      "個人情報全般の取り扱い基準を定める",
      "クレジットカード会員データの保護基準を定める",
      "政府機関のシステム調達要件を定める",
      "医療情報の電子化規格を定める"
    ],
    correct: 1,
    explanation: "<strong>PCI DSS</strong> はカード業界が策定したセキュリティ基準で、クレジットカード会員データを取り扱うすべての事業者が準拠を求められる。医療情報は HIPAA、個人情報は各国の個人情報保護法が担当する。"
  },
  {
    chapter: "第1章: セキュリティ要件",
    text: "セキュリティ要件を定義するうえで「多層防御（Defense in Depth）」の考え方として最も適切なものはどれか。",
    options: [
      "ファイアウォールを多重に配置してすべての不正通信を遮断する",
      "単一の強固な対策に集中してリソースを効率化する",
      "複数の独立した防御層を設け、一層が突破されても他の層で被害を抑える",
      "外部からの攻撃のみを対象とし、内部脅威は別途対策する"
    ],
    correct: 2,
    explanation: "多層防御は「一つの対策が破られても次の対策が機能する」設計思想。ネットワーク・アプリケーション・データの各層にそれぞれ独立した制御を設ける。"
  },

  // ──────────────────────────────────────────────
  // 第2章: 認証
  // ──────────────────────────────────────────────
  {
    chapter: "第2章: 認証",
    text: "Webアプリケーションでパスワードをデータベースに保存する際の設計として、最も適切なものはどれか。",
    options: [
      "パスワードを SHA-256 で1回ハッシュ化して保存する",
      "パスワードを AES-256 で暗号化して保存し、復号キーは設定ファイルに置く",
      "ユーザーごとに異なるランダムな salt を付けて bcrypt でハッシュ化し、ハッシュ値と salt を保存する",
      "パスワード文字列を Base64 エンコードして保存する"
    ],
    correct: 2,
    explanation: "ハッシュは不可逆。<strong>salt</strong> でレインボーテーブル攻撃を無効化し、<strong>bcrypt</strong> のコスト係数で総当たり攻撃に時間をかけさせる。SHA-256 は高速すぎて攻撃に弱い。AES は復号可能なため平文漏洩リスクがある。Base64 はエンコードであり暗号化ではない。"
  },
  {
    chapter: "第2章: 認証",
    text: "NIST SP800-63B で定義されている認証保証レベル（AAL: Authenticator Assurance Level）の段階数として正しいものはどれか。",
    options: ["2段階", "3段階", "4段階", "5段階"],
    correct: 1,
    explanation: "NIST SP800-63B は <strong>AAL1・AAL2・AAL3 の3段階</strong>を定義している。AAL1 は単要素、AAL2 は多要素、AAL3 は耐フィッシング多要素（ハードウェアキーなど）。"
  },
  {
    chapter: "第2章: 認証",
    text: "パスワードリセット機能の設計として不適切なものはどれか。",
    options: [
      "リセット用 URL は推測困難なトークンを含め、15〜30 分で失効させる",
      "リセット申請時、登録済み・未登録にかかわらず同一のメッセージを返す",
      "「該当メールアドレスが登録されていません」と表示してユーザーに知らせる",
      "リセット完了後は他端末の既存セッションを無効化する"
    ],
    correct: 2,
    explanation: "登録有無を区別したメッセージは<strong>ユーザー列挙攻撃</strong>の温床になる。攻撃者が有効なメールアドレスを特定できてしまう。応答は「登録されているメールアドレスには送信しました」のように統一する。"
  },
  {
    chapter: "第2章: 認証",
    text: "アカウントロック機能を実装する際に注意すべきリスクとして最も適切なものはどれか。",
    options: [
      "ロック中もパスワードハッシュが漏洩する可能性がある",
      "攻撃者が意図的にロックを発生させてサービス拒否攻撃に悪用できる",
      "ロック解除メールが盗聴されてアカウントが乗っ取られる",
      "ロック回数が多いとデータベースの容量が逼迫する"
    ],
    correct: 1,
    explanation: "アカウントロックは正規ユーザーも締め出すため、<strong>DoS 攻撃（サービス妨害）</strong>に悪用される。対策として CAPTCHA・IPレート制限・アカウントロックとは別の通知のみ行う方式などが検討される。"
  },
  {
    chapter: "第2章: 認証",
    text: "「秘密の質問（Security Question）」による本人確認を採用しない理由として最も適切なものはどれか。",
    options: [
      "サーバー側で答えを保管するためストレージを圧迫する",
      "答えが推測・調査されやすく、本人しか知らない情報とは言えない",
      "ユーザーが質問を忘れてしまうことが多い",
      "国際的な法規制によって使用が禁止されている"
    ],
    correct: 1,
    explanation: "「出身中学校」「母親の旧姓」などは SNS や公開情報から<strong>調査・推測</strong>されやすい。NIST SP800-63B も秘密の質問を記憶シークレットとして非推奨にしている。"
  },

  // ──────────────────────────────────────────────
  // 第3章: 認可・アクセス制御
  // ──────────────────────────────────────────────
  {
    chapter: "第3章: 認可・アクセス制御",
    text: "OpenID Connect の認可リクエストに含める `state` パラメータの目的として正しいものはどれか。",
    options: [
      "アクセストークンの有効期限を指定する",
      "CSRF を防ぐため、リクエストとレスポンスの対応を検証する",
      "ユーザーの権限スコープを示す",
      "ID トークンの署名アルゴリズムを指定する"
    ],
    correct: 1,
    explanation: "<strong>state</strong> はセッションに保持し、IdP（Identity Provider）から戻ってきた値と照合する。これにより攻撃者が起点となる認可フロー（CSRF）を検出・拒否できる。"
  },
  {
    chapter: "第3章: 認可・アクセス制御",
    text: "OAuth 2.0 における「アクセストークン」の説明として最も適切なものはどれか。",
    options: [
      "ユーザーのパスワードをハッシュ化した値",
      "サードパーティアプリがリソースサーバーにアクセスするための証明書",
      "ユーザーの身元を証明する ID トークン",
      "セッション ID と同義のセキュアなクッキー"
    ],
    correct: 1,
    explanation: "OAuth 2.0 の<strong>アクセストークン</strong>は、リソースオーナー（ユーザー）の代わりにクライアントアプリがリソースサーバーの API を呼び出すための認可証明書。ID トークンは OpenID Connect が追加した概念。"
  },
  {
    chapter: "第3章: 認可・アクセス制御",
    text: "FIDO2 認証が「フィッシング耐性がある」と言われる理由として最も適切なものはどれか。",
    options: [
      "ワンタイムパスワードを使うため毎回異なる値になる",
      "認証器（Authenticator）が接続先ドメインに紐付いた鍵ペアを使うため、偽サイトでは機能しない",
      "生体情報はサーバーに送信されないため盗まれない",
      "SMS や音声通話を使わないためSIMスワップ攻撃を受けない"
    ],
    correct: 1,
    explanation: "FIDO2 は<strong>登録時のオリジン（ドメイン）に束縛された秘密鍵</strong>で署名する。フィッシングサイトは正規ドメインと異なるため、認証器が署名を拒否する。"
  },

  // ──────────────────────────────────────────────
  // 第4章: セッション管理
  // ──────────────────────────────────────────────
  {
    chapter: "第4章: セッション管理",
    text: "セッション ID を格納する Cookie に必ず設定すべき属性の組み合わせとして適切なものはどれか。",
    options: [
      "Secure ＋ HttpOnly ＋ SameSite=Strict または Lax",
      "HttpOnly ＋ SameSite=None",
      "Secure ＋ Domain=.example.com ＋ Path=/",
      "Expires の長期設定 ＋ HttpOnly"
    ],
    correct: 0,
    explanation: "<strong>HttpOnly</strong>（JS からのアクセス遮断→XSS 対策）、<strong>Secure</strong>（HTTPS 限定送信→盗聴対策）、<strong>SameSite=Strict/Lax</strong>（クロスサイトリクエストでの送信制限→CSRF 対策）の3つをセットで設定する。"
  },
  {
    chapter: "第4章: セッション管理",
    text: "セッション固定攻撃（Session Fixation）を防ぐための対策として最も適切なものはどれか。",
    options: [
      "セッション ID を URL パラメータではなく Cookie で渡す",
      "ログイン成功後に新しいセッション ID を発行し直す",
      "セッション ID の長さを 128 ビット以上にする",
      "ログイン画面に CAPTCHA を設置する"
    ],
    correct: 1,
    explanation: "攻撃者が事前に仕込んだセッション ID を使われないよう、<strong>認証成功後に必ずセッション ID を再発行</strong>する。これによりログイン前後でセッション ID が変わり、固定攻撃が無効化される。"
  },
  {
    chapter: "第4章: セッション管理",
    text: "CSRF（Cross-Site Request Forgery）対策として最も効果があるものはどれか。",
    options: [
      "入力値を HTML エスケープする",
      "リクエストに含まれるトークンをセッションと照合する",
      "パスワードをハッシュ化して保存する",
      "エラーメッセージに詳細情報を含めない"
    ],
    correct: 1,
    explanation: "CSRF トークン方式では、フォームに<strong>セッション固有のランダムトークン</strong>を埋め込み、サーバー側でセッションのトークンと一致するか検証する。攻撃者は正規ページを読み込めないためトークンを取得できない。"
  },
  {
    chapter: "第4章: セッション管理",
    text: "適切なセッションタイムアウト設計として正しいものはどれか。",
    options: [
      "タイムアウトは UX を重視して設定せず、ユーザーが手動でログアウトすれば良い",
      "絶対タイムアウト（最終操作から一定時間）と相対タイムアウト（セッション開始から一定時間）の両方を設ける",
      "タイムアウト値はすべてのページで同一にする必要がある",
      "金融系サービスは 24 時間以上のタイムアウトを設定することが推奨される"
    ],
    correct: 1,

// ── State ────────────────────────────────────────────────
let current = 0;
let answered = false;
let score = 0;
const results = [];

// ── DOM ──────────────────────────────────────────────────
const qChapter      = document.getElementById('qChapter');
const qText         = document.getElementById('qText');
const optionsEl     = document.getElementById('options');
const explanation   = document.getElementById('explanation');
const explanHead    = document.getElementById('explanationHead');
const explanBody    = document.getElementById('explanationBody');
const btnNext       = document.getElementById('btnNext');
const progressFill  = document.getElementById('progressFill');
const progressLabel = document.getElementById('progressLabel');
const headerScore   = document.getElementById('headerScore');
const quizScreen    = document.getElementById('quizScreen');
const resultScreen  = document.getElementById('resultScreen');
const resultEmoji   = document.getElementById('resultEmoji');
const resultTitle   = document.getElementById('resultTitle');
const resultScore   = document.getElementById('resultScore');
const resultDetail  = document.getElementById('resultDetail');
const btnRetry      = document.getElementById('btnRetry');

// ── Render question ──────────────────────────────────────
function renderQuestion() {
  answered = false;
  explanation.classList.remove('visible');
  btnNext.classList.remove('visible');

  const q = QUESTIONS[current];
  const total = QUESTIONS.length;

  qChapter.textContent = q.chapter;

  // テキスト中の <code> タグをそのまま HTML として描画
  qText.innerHTML = q.text.replace(/\n/g, '<br>');

  progressFill.style.width = `${((current + 1) / total) * 100}%`;
  progressLabel.textContent = `${current + 1} / ${total}`;
  headerScore.textContent = `${score} / ${current}`;

  optionsEl.innerHTML = '';
  const labels = ['a', 'b', 'c', 'd'];
  q.options.forEach((opt, i) => {
    const btn = document.createElement('button');
    btn.className = 'opt-btn';
    btn.innerHTML = `<span class="opt-label">${labels[i]}.</span><span>${opt}</span>`;
    btn.addEventListener('click', () => selectAnswer(i));
    optionsEl.appendChild(btn);
  });
}

// ── Select answer ────────────────────────────────────────
function selectAnswer(index) {
  if (answered) return;
  answered = true;

  const q = QUESTIONS[current];
  const correct = index === q.correct;
  if (correct) score++;

  results.push({ text: q.text.replace(/<[^>]+>/g, '').split('\n')[0], correct });

  const btns = optionsEl.querySelectorAll('.opt-btn');
  btns.forEach((btn, i) => {
    btn.classList.add('answered');
    if (i === q.correct) btn.classList.add('correct');
    else if (i === index && !correct) btn.classList.add('wrong');
  });

  explanHead.className = 'explanation-head ' + (correct ? 'ok' : 'ng');
  explanHead.textContent = correct ? '✓ 正解！' : '✗ 不正解';
  explanBody.innerHTML = q.explanation;
  explanation.classList.add('visible');

  btnNext.textContent = current < QUESTIONS.length - 1 ? '次の問題 →' : '結果を見る';
  btnNext.classList.add('visible');

  headerScore.textContent = `${score} / ${current + 1}`;
}

// ── Next ─────────────────────────────────────────────────
btnNext.addEventListener('click', () => {
  if (current < QUESTIONS.length - 1) {
    current++;
    renderQuestion();
    window.scrollTo(0, 0);
  } else {
    showResult();
  }
});

// ── Result ───────────────────────────────────────────────
function showResult() {
  quizScreen.style.display = 'none';
  resultScreen.classList.add('visible');

  const total = QUESTIONS.length;
  const pct = Math.round((score / total) * 100);

  if (pct >= 90)      { resultEmoji.textContent = '🏆'; resultTitle.textContent = '素晴らしい！'; }
  else if (pct >= 70) { resultEmoji.textContent = '🎉'; resultTitle.textContent = '合格ライン到達！'; }
  else if (pct >= 50) { resultEmoji.textContent = '📖'; resultTitle.textContent = 'もう少し！'; }
  else                { resultEmoji.textContent = '💪'; resultTitle.textContent = '復習して再挑戦！'; }

  resultScore.innerHTML = `スコア <span>${score} / ${total}</span>（${pct}%）`;

  resultDetail.innerHTML = results.map((r, i) => {
    const badge = r.correct
      ? '<span class="result-badge ok">正解</span>'
      : '<span class="result-badge ng">不正解</span>';
    const qShort = r.text.length > 45 ? r.text.slice(0, 45) + '…' : r.text;
    return `<div class="result-row">${badge}<span class="result-q-text">Q${i+1}. ${qShort}</span></div>`;
  }).join('');

  window.scrollTo(0, 0);
}

// ── Retry ────────────────────────────────────────────────
btnRetry.addEventListener('click', () => {
  current = 0;
  score = 0;
  results.length = 0;
  resultScreen.classList.remove('visible');
  quizScreen.style.display = '';
  renderQuestion();
  window.scrollTo(0, 0);
});

// ── Boot ─────────────────────────────────────────────────
renderQuestion();
</script>
